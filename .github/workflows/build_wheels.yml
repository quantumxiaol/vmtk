name: Build VMTK Wheels (Official Alignment)

on:
  push:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} (${{ matrix.cibw_arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14
            cibw_arch: arm64
          - os: macos-13
            cibw_arch: x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build wheels using cibuildwheel
        uses: pypa/cibuildwheel@v2.17.0
        env:
          CIBW_ARCHS: ${{ matrix.cibw_arch }}
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "pp* *musllinux*"
          CIBW_ENVIRONMENT_MACOS: >
            CMAKE_ARGS="-DUSE_SYSTEM_VTK=ON"

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ matrix.cibw_arch }}
          path: ./wheelhouse/*.whl
