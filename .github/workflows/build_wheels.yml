name: Build VMTK Wheels (Official Alignment)

on:
  push:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} (${{ matrix.cibw_arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14
            cibw_arch: arm64
          - os: macos-13
            cibw_arch: x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build wheels using cibuildwheel
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_ARCHS: ${{ matrix.cibw_arch }}
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*musllinux*"
          CIBW_BUILD_VERBOSITY: "1"
          CIBW_BEFORE_BUILD_MACOS: >
            python -m pip install "vtk==9.5.0"
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            DYLD_LIBRARY_PATH="$(python -c 'from pathlib import Path; import site, importlib.util, sys; spec=importlib.util.find_spec("vtkmodules"); candidates=[]; candidates += [Path(spec.origin).resolve().parent/".dylibs", Path(spec.origin).resolve().parent] if spec else []; [candidates.extend([Path(sp)/"vtkmodules"/".dylibs", Path(sp)/"vtkmodules", Path(sp)/"lib"]) for sp in site.getsitepackages()]; found=next((p for p in candidates if p.exists() and any(p.glob("libvtk*.dylib"))), None); print(found if found else ""); sys.exit(0 if found else "VTK dylib path not found")')"
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}
          CIBW_ENVIRONMENT_MACOS: >
            CMAKE_ARGS="-DUSE_SYSTEM_VTK=ON"

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ matrix.cibw_arch }}
          path: ./wheelhouse/*.whl
